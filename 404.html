<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found - MovieChill</title>
  <style>
    body {
      padding: 0;
      margin: 0;
      font-family: 'Inter', sans-serif, Arial;
      background-color: #fff;
    }
    
    .page_404 {
      padding: 40px 0;
      background: #fff;
      text-align: center;
    }
    
    .page_404 h1 {
      font-size: 80px;
      margin: 0;
    }
    
    .four_zero_four_bg {
      background-image: url(https://cdn.dribbble.com/users/285475/screenshots/2083086/dribbble_1.gif);
      height: 400px;
      background-position: center;
      background-repeat: no-repeat;
    }
    
    .contant_box_404 {
      margin-top: -50px;
    }
    
    .contant_box_404 h3 {
      font-size: 40px;
      margin: 0 0 10px 0;
    }
    
    .contant_box_404 p {
      font-size: 16px;
      color: #666;

    }
    
    .link_404 {
      color: #fff;
      padding: 10px 20px;
      background: #39ac31;
      margin: 20px 0;
      display: inline-block;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      transition: background 0.3s ease;
    }
    
    .link_404:hover {
      background: #2b8b24;
    }

  <section class="page_404">
    <div class="container">
      <h1>404</h1>
